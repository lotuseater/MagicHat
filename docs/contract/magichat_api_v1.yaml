openapi: 3.1.0
info:
  title: MagicHat Host API
  version: 1.0.0
  summary: Mobile controller for Team App instances running on one LAN PC.
  description: |
    v1 scope is explicit and fixed:
    - Windows host service only
    - local-LAN only (no WAN/cloud)
    - one-time pairing code shown on the PC
    - bearer session token after pairing

servers:
  - url: http://{lan_host}:{port}
    description: LAN-reachable host service running on the paired PC.
    variables:
      lan_host:
        default: 192.168.1.10
      port:
        default: "18765"

tags:
  - name: pairing
  - name: host
  - name: instances
  - name: cli-instances

security:
  - BearerAuth: []

paths:
  /v1/pairing/session:
    post:
      tags: [pairing]
      summary: Exchange one-time pairing code for a bearer token.
      security: []
      operationId: createPairingSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingSessionRequest'
      responses:
        '201':
          description: Pairing accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Pairing code already used or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/host:
    get:
      tags: [host]
      summary: Get paired host metadata.
      operationId: getHostInfo
      responses:
        '200':
          description: Host metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/instances:
    get:
      tags: [instances]
      summary: List open Team App instances from beacon.
      operationId: listInstances
      x-team-app-mapping:
        source: beacon
        file: "%TEMP%/wizard_team_app/active_instances.json"
      responses:
        '200':
          description: Active instances.
          content:
            application/json:
              schema:
                type: object
                required: [instances]
                properties:
                  instances:
                    type: array
                    items:
                      $ref: '#/components/schemas/InstanceRef'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [instances]
      summary: Launch a new Team App instance on the PC.
      operationId: launchInstance
      x-team-app-mapping:
        sequence:
          - source: process_spawn
            executable: wizard_team_app.exe
            beacon_confirmation: true
          - cmd: set_startup_profile
            when_any_request_field_present:
              - team_mode
              - launcher_preset
              - fenrus_launcher
            payload:
              team_mode: $request.team_mode
              launcher_preset: $request.launcher_preset
              fenrus_launcher: $request.fenrus_launcher
          - cmd: submit_initial_prompt
            when_request_field_present: title
            payload:
              instance_id: $beacon.instance_id
              prompt: $request.title
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LaunchInstanceRequest'
      responses:
        '201':
          description: Instance launched and visible in beacon.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceRef'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '504':
          description: Launch command accepted but beacon registration timeout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/restore-refs:
    get:
      tags: [instances]
      summary: List host-generated restore refs for known Team App sessions.
      operationId: listRestoreRefs
      x-team-app-mapping:
        source: host-maintained_restore_ref_index
        input: beacon.restore_state_path
        note: Raw Team App restore_state_path values stay on the PC; mobile callers use opaque restore_ref selectors.
      responses:
        '200':
          description: Known restore refs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestoreRefsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/instances/{pid}:
    parameters:
      - $ref: '#/components/parameters/PidParam'
    get:
      tags: [instances]
      summary: Get instance detail via Team App inspect command.
      operationId: getInstanceDetail
      x-team-app-mapping:
        sequence:
          - cmd: inspect
            payload:
              include_chat: true
              include_summary: true
              include_terminals: true
      responses:
        '200':
          description: Instance detail snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [instances]
      summary: Close an existing Team App instance.
      operationId: closeInstance
      x-team-app-mapping:
        sequence:
          - cmd: close_instance
            payload:
              instance_id: $beacon.instance_id
              pid: $beacon.pid
          - verify: beacon_entry_absent
      responses:
        '202':
          description: Close request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/instances/{pid}/prompt:
    parameters:
      - $ref: '#/components/parameters/PidParam'
    post:
      tags: [instances]
      summary: Send initial task prompt to Team App.
      operationId: sendInitialPrompt
      x-team-app-mapping:
        sequence:
          - cmd: submit_initial_prompt
            payload:
              instance_id: $beacon.instance_id
              prompt: $request.prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '202':
          description: Prompt queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/instances/{pid}/follow-up:
    parameters:
      - $ref: '#/components/parameters/PidParam'
    post:
      tags: [instances]
      summary: Send follow-up prompt to an existing Team App instance.
      operationId: sendFollowUp
      x-team-app-mapping:
        sequence:
          - cmd: submit_follow_up
            payload:
              instance_id: $beacon.instance_id
              prompt: $request.message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpRequest'
      responses:
        '202':
          description: Follow-up queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/instances/{pid}/trust:
    parameters:
      - $ref: '#/components/parameters/PidParam'
    post:
      tags: [instances]
      summary: Answer a Team App trust prompt for the active instance.
      operationId: answerTrustPrompt
      x-team-app-mapping:
        sequence:
          - cmd: answer_trust_prompt
            payload:
              instance_id: $beacon.instance_id
              approved: $request.approved
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrustPromptRequest'
      responses:
        '202':
          description: Trust response queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/instances/{pid}/restore:
    parameters:
      - $ref: '#/components/parameters/PidParam'
    post:
      tags: [instances]
      summary: Restore a Team App session from either an opaque restore ref or a raw restore file path.
      operationId: restoreSession
      x-team-app-mapping:
        sequence:
          - cmd: restore_session
            payload:
              path:
                one_of:
                  - $request.restore_ref -> host resolves to restore_state_path
                  - $request.restore_state_path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreSessionRequest'
      responses:
        '202':
          description: Restore command accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/instances/{pid}/updates:
    parameters:
      - $ref: '#/components/parameters/PidParam'
    get:
      tags: [instances]
      summary: Subscribe to instance updates as Server-Sent Events.
      operationId: subscribeInstanceUpdates
      x-team-app-mapping:
        priority_order:
          - events_path
          - inspect_polling
          - run_log_path_read_only
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/instances/{pid}/poll:
    parameters:
      - $ref: '#/components/parameters/PidParam'
      - in: query
        name: include_chat
        schema:
          type: boolean
          default: true
      - in: query
        name: include_summary
        schema:
          type: boolean
          default: true
      - in: query
        name: include_terminals
        schema:
          type: boolean
          default: true
    get:
      tags: [instances]
      summary: Pull current instance state via Team App inspect command.
      operationId: pollInstance
      x-team-app-mapping:
        cmd: inspect
      responses:
        '200':
          description: Poll payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/cli-instances/presets:
    get:
      tags: [cli-instances]
      summary: List built-in CLI presets (claude, codex, gemini) and their default args.
      operationId: listCliPresets
      responses:
        '200':
          description: Available CLI presets.
          content:
            application/json:
              schema:
                type: object
                required: [presets]
                properties:
                  presets:
                    type: array
                    items:
                      $ref: '#/components/schemas/CliPreset'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/cli-instances:
    get:
      tags: [cli-instances]
      summary: List currently tracked CLI instances on the host.
      operationId: listCliInstances
      responses:
        '200':
          description: CLI instances snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [instances]
                properties:
                  instances:
                    type: array
                    items:
                      $ref: '#/components/schemas/CliInstance'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [cli-instances]
      summary: Launch a new CLI instance with full-permissions / plan-mode defaults.
      operationId: launchCliInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LaunchCliInstanceRequest'
      responses:
        '201':
          description: CLI instance summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliInstance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/cli-instances/{cliInstanceId}:
    parameters:
      - in: path
        name: cliInstanceId
        required: true
        schema:
          type: string
    get:
      tags: [cli-instances]
      summary: Get one CLI instance snapshot (status + captured output).
      operationId: getCliInstance
      responses:
        '200':
          description: CLI instance detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliInstance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [cli-instances]
      summary: Signal the CLI instance to exit (SIGTERM, or SIGKILL when ?force=true).
      operationId: closeCliInstance
      parameters:
        - in: query
          name: force
          schema:
            type: boolean
            default: false
      responses:
        '202':
          description: Close queued.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/cli-instances/{cliInstanceId}/prompt:
    parameters:
      - in: path
        name: cliInstanceId
        required: true
        schema:
          type: string
    post:
      tags: [cli-instances]
      summary: Write a prompt to the CLI process stdin (newline appended if missing).
      operationId: sendCliPrompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
      responses:
        '202':
          description: Prompt written.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: CLI is not running or stdin is unavailable.

  /v1/cli-instances/{cliInstanceId}/updates:
    parameters:
      - in: path
        name: cliInstanceId
        required: true
        schema:
          type: string
    get:
      tags: [cli-instances]
      summary: Subscribe to CLI output chunks via Server-Sent Events.
      operationId: subscribeCliUpdates
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: MagicHatSessionToken

  parameters:
    PidParam:
      name: pid
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    Unauthorized:
      description: Missing, expired, or invalid token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Instance was not found in beacon.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid request payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    PairingSessionRequest:
      type: object
      required: [pairing_code, device_name]
      properties:
        pairing_code:
          type: string
          minLength: 4
          maxLength: 32
        device_name:
          type: string
          minLength: 1
          maxLength: 128
        device_id:
          type: string
          minLength: 1
          maxLength: 128

    PairingSessionResponse:
      type: object
      required: [session_token, expires_at, host_id, host_name]
      properties:
        session_token:
          type: string
        expires_at:
          type: string
          format: date-time
        host_id:
          type: string
        host_name:
          type: string

    HostInfo:
      type: object
      required: [host_id, host_name, lan_address, api_version]
      properties:
        host_id:
          type: string
        host_name:
          type: string
        lan_address:
          type: string
        api_version:
          type: string
        scope:
          type: string
          enum: [lan_only_v1]

    InstanceRef:
      type: object
      required:
        - id
        - instance_id
        - pid
        - hwnd
        - session_id
        - phase
        - current_task_state
        - artifact_dir
        - cmd_path
        - resp_path
        - events_path
        - run_artifact_dir
        - run_log_path
        - restore_state_path
        - started_at
        - heartbeat_ts
        - last_activity_ts
        - result_summary
        - health
      properties:
        id:
          type: string
        instance_id:
          type: string
        pid:
          type: integer
        hwnd:
          type: integer
        session_id:
          type: string
        phase:
          type: string
        current_task_state:
          type: object
          additionalProperties: true
        artifact_dir:
          type: string
        cmd_path:
          type: string
        resp_path:
          type: string
        events_path:
          type: string
        run_artifact_dir:
          type: string
        run_log_path:
          type: string
        restore_state_path:
          type: string
        started_at:
          type: integer
        heartbeat_ts:
          type: integer
        last_activity_ts:
          type: integer
        result_summary:
          type: object
          additionalProperties: true
        health:
          type: object
          additionalProperties: true

    InstanceDetail:
      allOf:
        - $ref: '#/components/schemas/InstanceRef'
        - type: object
          required: [status, snapshot]
          properties:
            status:
              type: string
            snapshot:
              type: object
              additionalProperties: true
            chat:
              type: array
              items:
                type: object
                additionalProperties: true
            summary_text:
              type: string
            terminals_by_agent:
              type: object
              additionalProperties:
                type: string
            run_log_path:
              type: string

    LaunchInstanceRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          description: Optional display title / initial task label for the launched Team App instance.
        team_mode:
          type: string
          enum: [simple, full]
          description: Optional Team App run mode override for the new instance.
        launcher_preset:
          type: string
          enum: [claude-code, codex, claude-legacy, custom-legacy, gemini]
          description: Optional default launcher preset override for the new instance.
        fenrus_launcher:
          type: string
          enum: [default, claude-code, codex, claude-legacy, custom-legacy, gemini]
          description: Optional Fenrus launcher override for the new instance. Use `default` to follow the shared launcher.
        restore_ref:
          type: string
          minLength: 1
          description: Preferred opaque host-generated restore selector for LAN and remote callers.
        restore_state_path:
          type: string
          description: Optional raw Team App restore_state_path fallback for local compatibility/debugging.
        startup_timeout_ms:
          type: integer
          minimum: 100
          maximum: 120000
          default: 15000

    PromptRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1

    CliPreset:
      type: object
      required: [preset, label, command, default_args]
      properties:
        preset:
          type: string
          enum: [claude, codex, gemini]
        label:
          type: string
        command:
          type: string
        default_args:
          type: array
          items:
            type: string
          description: Baked-in flags applied at launch — full-permissions + plan-mode defaults.

    CliInstance:
      type: object
      required: [instance_id, preset, preset_label, title, command, args, status, output, event_count]
      properties:
        instance_id:
          type: string
        preset:
          type: string
          enum: [claude, codex, gemini]
        preset_label:
          type: string
        title:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        pid:
          type: integer
          nullable: true
        started_at:
          type: integer
          format: int64
          nullable: true
        ended_at:
          type: integer
          format: int64
          nullable: true
        exit_code:
          type: integer
          nullable: true
        exit_signal:
          type: string
          nullable: true
        status:
          type: string
          enum: [running, exited, exited_error, error]
        output:
          type: string
          description: Captured stdout+stderr so far (truncated in the middle when exceeding limits).
        event_count:
          type: integer

    LaunchCliInstanceRequest:
      type: object
      required: [preset]
      properties:
        preset:
          type: string
          enum: [claude, codex, gemini]
        title:
          type: string
          minLength: 1
        initial_prompt:
          type: string
          description: Optional first prompt; passed as the trailing positional arg to the CLI.
        extra_args:
          type: array
          items:
            type: string
          description: Extra raw CLI arguments inserted between defaults and the initial prompt.

    FollowUpRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1

    RestoreSessionRequest:
      type: object
      minProperties: 1
      properties:
        restore_ref:
          type: string
          minLength: 1
        restore_state_path:
          type: string
          minLength: 1

    TrustPromptRequest:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean

    KnownRestoreRef:
      type: object
      required: [restore_ref]
      properties:
        restore_ref:
          type: string
        title:
          type: string
        session_id:
          type: string
        observed_at:
          type: string
          format: date-time

    RestoreRefsResponse:
      type: object
      required: [restore_refs]
      properties:
        restore_refs:
          type: array
          items:
            $ref: '#/components/schemas/KnownRestoreRef'

    AckResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, queued]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string
