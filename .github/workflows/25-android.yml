name: 25-android

on:
  push:
    paths:
      - "mobile/android/**"
      - "scripts/mobile-validation/android_*"
      - ".github/workflows/25-android.yml"
  pull_request:
    paths:
      - "mobile/android/**"
      - "scripts/mobile-validation/android_*"
      - ".github/workflows/25-android.yml"

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Android unit tests
        run: ./scripts/mobile-validation/android_unit_tests.sh
