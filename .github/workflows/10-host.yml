name: 10-host

on:
  push:
    paths:
      - "MagicHat/host/**"
      - "MagicHat/tests/host/**"
      - "MagicHat/tests/lan/**"
      - "MagicHat/scripts/host/**"
      - "MagicHat/docs/host/**"
      - "MagicHat/tests/contracts/**"
      - "MagicHat/.github/workflows/10-host.yml"
  pull_request:
    paths:
      - "MagicHat/host/**"
      - "MagicHat/tests/host/**"
      - "MagicHat/tests/lan/**"
      - "MagicHat/scripts/host/**"
      - "MagicHat/docs/host/**"
      - "MagicHat/tests/contracts/**"
      - "MagicHat/.github/workflows/10-host.yml"

jobs:
  host-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MagicHat/host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "MagicHat/host/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Run Host Tests
        run: npm test

      - name: Replay Contract Fixtures
        run: npm run contract:replay
