name: 10-host

on:
  push:
    paths:
      - "host/**"
      - "tests/host/**"
      - "tests/lan/**"
      - "tests/android/**"
      - "tests/integration/mobile_host/**"
      - "scripts/host/**"
      - "docs/host/**"
      - "tests/contracts/**"
      - ".github/workflows/10-host.yml"
  pull_request:
    paths:
      - "host/**"
      - "tests/host/**"
      - "tests/lan/**"
      - "tests/android/**"
      - "tests/integration/mobile_host/**"
      - "scripts/host/**"
      - "docs/host/**"
      - "tests/contracts/**"
      - ".github/workflows/10-host.yml"

jobs:
  host-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "host/package-lock.json"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: npm ci

      - name: Run Host Tests
        run: npm test

      - name: Replay Contract Fixtures
        run: npm run contract:replay

      - name: Run Android Transport Tests
        working-directory: .
        run: python3 -m pytest tests/android/android_transport_scenarios_test.py -q
